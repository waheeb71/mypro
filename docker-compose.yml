version: '3.8'

services:
  ngfw-api:
    build: .
    image: enterprise-ngfw:latest
    container_name: ngfw-api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./api/rest/gunicorn_conf.py:/app/api/rest/gunicorn_conf.py:ro
      # Mount GeoIP database if available locally
      # - ./data/geoip:/var/lib/geoip:ro
    networks:
      - ngfw-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Simple dashboard server (for demonstration/dashboard)
  # In a real production setup, this would be Nginx serving static files
  ngfw-dashboard:
    image: nginx:alpine
    container_name: ngfw-dashboard
    restart: always
    volumes:
      - ./api/dashboard:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    networks:
      - ngfw-net
    depends_on:
      - ngfw-api

networks:
  ngfw-net:
    driver: bridge
